<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>KYC Aura — Gaze PIN Test</title>
<style>
  :root{
    --bg:#05070c; --panel:#0b111f; --panel-2:#101a2e; --line:#1c2740;
    --teal:#35e8cf; --teal-dim:#1a5c53; --text:#eaf1f7; --text-dim:#7d8cab; --danger:#ff6b6b;
  }
  *{box-sizing:border-box;}
  html,body{ margin:0; height:100%; overflow:hidden; background:var(--bg); color:var(--text);
    font-family:'Courier New', ui-monospace, SFMono-Regular, Menlo, monospace; -webkit-font-smoothing:antialiased; }

  .statusbar{
    position:fixed; top:0; left:0; right:0; z-index:50;
    display:flex; align-items:center; justify-content:space-between;
    padding:8px 12px; font-size:10.5px; color:var(--text-dim);
    background:rgba(5,7,12,.85); border-bottom:1px solid var(--line);
  }
  .statusbar .dotstate{ display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:6px; background:#565f78; }
  .statusbar .dotstate.live{ background:var(--teal); box-shadow:0 0 8px var(--teal); }
  .statusbar .dotstate.warn{ background:#ffb648; box-shadow:0 0 8px #ffb648; }
  .statusbar button{ background:var(--panel-2); color:var(--text); border:1px solid var(--line); border-radius:7px;
    padding:4px 8px; font-size:10px; font-family:inherit; cursor:pointer; }

  .screen{ position:fixed; inset:0; padding-top:34px; display:flex; flex-direction:column; }
  .screen.hidden{ display:none; }

  /* ---- setup (touch) ---- */
  #setupScreen{ align-items:center; padding:44px 18px 24px; gap:14px; overflow-y:auto; }
  .brandrow{ display:flex; align-items:center; gap:10px; }
  .orb{ width:34px; height:34px; border-radius:50%;
    background:conic-gradient(from 90deg,#35e8cf,#6ea8ff,#c78bff,#ff8bb0,#ffd27a,#35e8cf); box-shadow:0 0 14px rgba(53,232,207,.35); }
  .brandtext .name{ font-size:16px; font-weight:700; }
  .brandtext .sub{ font-size:10px; letter-spacing:1.5px; color:var(--text-dim); text-transform:uppercase; }
  h1{ font-size:20px; margin:4px 0; text-align:center; }
  .instructions{ font-size:12.5px; color:var(--text-dim); text-align:center; max-width:340px; line-height:1.5; margin:0; }
  .pindots{ display:flex; gap:9px; }
  .dot{ width:14px; height:14px; border-radius:50%; border:2px solid var(--line); transition:.2s; }
  .dot.filled{ background:var(--teal); border-color:var(--teal); box-shadow:0 0 10px rgba(53,232,207,.6); }
  .keypad{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; width:100%; max-width:320px; }
  .key{ background:var(--panel-2); border:1px solid var(--line); border-radius:14px; height:64px;
    display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:700; cursor:pointer; user-select:none; }
  .key:active{ background:var(--teal-dim); border-color:var(--teal); }
  .key.action{ font-size:12px; letter-spacing:1px; }
  .key.action.clear{ color:var(--danger); }
  .primaryBtn{ background:var(--teal); color:#04211d; border:none; border-radius:12px; padding:12px 22px;
    font-family:inherit; font-weight:700; font-size:13px; letter-spacing:.5px; cursor:pointer; }
  .primaryBtn:disabled{ opacity:.35; }
  .ghostBtn{ background:transparent; color:var(--text-dim); border:1px solid var(--line); border-radius:12px;
    padding:10px 18px; font-family:inherit; font-size:12px; cursor:pointer; }

  /* ---- calibration ---- */
  #calScreen{ align-items:center; justify-content:flex-end; }
  .calText{ text-align:center; font-size:12.5px; color:var(--text-dim); padding:0 20px 26px; max-width:320px; }
  .calText b{ color:var(--text); }
  .calDot{ position:fixed; width:34px; height:34px; margin:-17px 0 0 -17px; border-radius:50%;
    background:radial-gradient(circle,#ffe6ad,#ffd27a); box-shadow:0 0 24px rgba(255,210,122,.7);
    animation:calpulse 1s ease-in-out infinite; }
  @keyframes calpulse{ 0%,100%{transform:scale(1);} 50%{transform:scale(1.18);} }

  /* ---- test (gaze quadrant panel, fills entire screen) ---- */
  #testScreen{ padding:0; }
  .quadrant-panel{ position:absolute; inset:0; }
  .tri{ position:absolute; inset:0; background:var(--panel-2); border:1px solid #05070c;
    display:flex; align-items:center; justify-content:center; transition: background .15s; }
  .tri-top{ clip-path: polygon(0 0, 100% 0, 50% 50%); }
  .tri-right{ clip-path: polygon(100% 0, 100% 100%, 50% 50%); }
  .tri-bottom{ clip-path: polygon(100% 100%, 0 100%, 50% 50%); }
  .tri-left{ clip-path: polygon(0 100%, 0 0, 50% 50%); }
  .tri.gazed{ background:#0d2530; }
  .tri.ready{ background:#0e3830; }
  .tri.correct{ background:#123a24 !important; }
  .tri.wrong{ background:#3a1414 !important; }
  .triInner{ position:absolute; width:150px; height:150px; margin:-75px 0 0 -75px;
    display:flex; align-items:center; justify-content:center; pointer-events:none; }
  .tri-top .triInner{ top:19%; left:50%; }
  .tri-right .triInner{ top:50%; left:81%; }
  .tri-bottom .triInner{ top:81%; left:50%; }
  .tri-left .triInner{ top:50%; left:19%; }
  .triNum{ font-size:56px; font-weight:700; color:var(--text); z-index:2; }
  .ring{ position:absolute; inset:0; width:100%; height:100%; transform:rotate(-90deg); }
  .ring circle{ fill:none; }
  .ring .track{ stroke:#1a2338; stroke-width:5; }
  .ring .progress{ stroke:var(--teal); stroke-width:5; stroke-linecap:round;
    stroke-dasharray:433.5; stroke-dashoffset:433.5; filter:drop-shadow(0 0 6px rgba(53,232,207,.8)); }

  .testTopInfo{ position:fixed; top:34px; left:0; right:0; z-index:15; text-align:center;
    font-size:12px; color:var(--text-dim); padding:6px 0; pointer-events:none; }
  .testTopInfo b{ color:var(--teal); }

  /* ---- result ---- */
  #resultScreen{ align-items:center; justify-content:center; gap:18px; padding:24px; text-align:center; }
  .resultBadge{ font-size:22px; font-weight:700; padding:10px 22px; border-radius:12px; }
  .resultBadge.pass{ background:#123a24; color:var(--teal); border:1px solid var(--teal); }
  .resultBadge.fail{ background:#3a1414; color:var(--danger); border:1px solid var(--danger); }
  .resultRow{ display:flex; gap:16px; font-size:13px; color:var(--text-dim); }
  .resultCol{ display:flex; flex-direction:column; align-items:center; gap:6px; }
  .resultDigits{ display:flex; gap:8px; }
  .rdigit{ width:34px; height:34px; border-radius:8px; display:flex; align-items:center; justify-content:center;
    font-size:16px; font-weight:700; border:1px solid var(--line); background:var(--panel-2); }
  .rdigit.ok{ border-color:var(--teal); color:var(--teal); }
  .rdigit.bad{ border-color:var(--danger); color:var(--danger); }
  .resultBtns{ display:flex; gap:12px; }

  .gazecursor{ position:fixed; width:16px; height:16px; margin:-8px 0 0 -8px; border:2px solid var(--teal);
    border-radius:50%; pointer-events:none; z-index:60; opacity:0; transition:opacity .2s; box-shadow:0 0 10px rgba(53,232,207,.7); }
  .gazecursor.on{ opacity:.9; }
  .campreview{ position:fixed; top:34px; right:8px; width:74px; height:56px; border-radius:8px; overflow:hidden;
    border:1px solid var(--line); background:#000; z-index:55; opacity:.85; }
  .campreview video{ width:100%; height:100%; object-fit:cover; transform:scaleX(-1); }
  .campreview.hidden{ display:none; }
</style>
</head>
<body>

<div class="statusbar">
  <div><span class="dotstate" id="statusDot"></span><span id="statusText">Starting…</span></div>
  <button id="toggleModeBtn">Use mouse instead</button>
</div>

<div class="gazecursor" id="gazeCursor"></div>
<div class="campreview hidden" id="camPreview"><video id="video" autoplay playsinline muted></video></div>

<!-- SETUP -->
<div class="screen" id="setupScreen">
  <div class="brandrow">
    <div class="orb"></div>
    <div class="brandtext"><div class="name">KYC Aura</div><div class="sub">Gaze PIN Test · v0.8</div></div>
  </div>
  <h1>Set your 5-digit PIN</h1>
  <p class="instructions">Enter it by touch. You'll then be tested on recalling it using gaze + blink only.</p>
  <div class="pindots" id="pindots"></div>
  <div class="keypad" id="setupKeypad"></div>
  <button class="primaryBtn" id="startTestBtn" disabled>Start Gaze Test</button>
</div>

<!-- CALIBRATION -->
<div class="screen hidden" id="calScreen">
  <div class="calText" id="calText"><b>Calibrating…</b><br>Look at the glowing dot, then tap it.</div>
</div>

<!-- TEST -->
<div class="screen hidden" id="testScreen">
  <div class="testTopInfo" id="testTopInfo">Digit <b>1</b> of 5 — look at your next PIN digit, blink to confirm</div>
  <div class="quadrant-panel" id="quadrantPanel">
    <div class="tri tri-top" data-pos="top">
      <svg class="ring" viewBox="0 0 150 150"><circle class="track" cx="75" cy="75" r="69"></circle><circle class="progress" cx="75" cy="75" r="69"></circle></svg>
      <div class="triInner"><span class="triNum"></span></div>
    </div>
    <div class="tri tri-right" data-pos="right">
      <svg class="ring" viewBox="0 0 150 150"><circle class="track" cx="75" cy="75" r="69"></circle><circle class="progress" cx="75" cy="75" r="69"></circle></svg>
      <div class="triInner"><span class="triNum"></span></div>
    </div>
    <div class="tri tri-bottom" data-pos="bottom">
      <svg class="ring" viewBox="0 0 150 150"><circle class="track" cx="75" cy="75" r="69"></circle><circle class="progress" cx="75" cy="75" r="69"></circle></svg>
      <div class="triInner"><span class="triNum"></span></div>
    </div>
    <div class="tri tri-left" data-pos="left">
      <svg class="ring" viewBox="0 0 150 150"><circle class="track" cx="75" cy="75" r="69"></circle><circle class="progress" cx="75" cy="75" r="69"></circle></svg>
      <div class="triInner"><span class="triNum"></span></div>
    </div>
  </div>
</div>

<!-- RESULT -->
<div class="screen hidden" id="resultScreen">
  <div class="resultBadge" id="resultBadge">—</div>
  <div class="resultRow">
    <div class="resultCol"><div>Your PIN</div><div class="resultDigits" id="rowPin"></div></div>
    <div class="resultCol"><div>You entered (gaze)</div><div class="resultDigits" id="rowEntered"></div></div>
  </div>
  <div class="resultBtns">
    <button class="primaryBtn" id="retryTestBtn">Try Test Again</button>
    <button class="ghostBtn" id="newPinBtn">Set New PIN</button>
  </div>
</div>

<script type="module">
window.addEventListener('error', (e)=>{
  document.title = 'ERROR — KYC Aura';
  const el = document.getElementById('statusText');
  if(el) el.textContent = 'Script error: ' + (e.message || e.error || 'unknown');
  const dot = document.getElementById('statusDot');
  if(dot) dot.className = 'dotstate warn';
});
window.addEventListener('unhandledrejection', (e)=>{
  const el = document.getElementById('statusText');
  if(el) el.textContent = 'Promise error: ' + (e.reason && e.reason.message ? e.reason.message : e.reason);
  const dot = document.getElementById('statusDot');
  if(dot) dot.className = 'dotstate warn';
});
try{

document.getElementById('statusText').textContent = 'Script loaded — building UI…';
setTimeout(()=>{
  if(document.getElementById('statusText').textContent.includes('building UI')){
    document.getElementById('statusText').textContent = 'Stuck after load — hard-refresh the page (this may be a cached old version)';
    document.getElementById('statusDot').className = 'dotstate warn';
  }
}, 4000);


function shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function setStatus(text, state){ statusText.textContent = text; statusDot.className = 'dotstate' + (state ? ' ' + state : ''); }

const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const toggleModeBtn = document.getElementById('toggleModeBtn');
const gazeCursor = document.getElementById('gazeCursor');
const camPreview = document.getElementById('camPreview');
const video = document.getElementById('video');

const screens = {
  setup: document.getElementById('setupScreen'),
  cal: document.getElementById('calScreen'),
  test: document.getElementById('testScreen'),
  result: document.getElementById('resultScreen'),
};
let phase = 'setup';
function showScreen(name){
  Object.values(screens).forEach(s=>s.classList.add('hidden'));
  screens[name].classList.remove('hidden');
  phase = name;
}

const SETUP_LAYOUT = [
  {v:'1'},{v:'2'},{v:'3'},{v:'4'},{v:'5'},{v:'6'},{v:'7'},{v:'8'},{v:'9'},
  {v:'DEL', label:'Delete', action:true},{v:'0'},{v:'CLR', label:'Clear', action:true, clear:true},
];
const setupKeypad = document.getElementById('setupKeypad');
SETUP_LAYOUT.forEach(k=>{
  const b = document.createElement('div');
  b.className = 'key' + (k.action?' action':'') + (k.clear?' clear':'');
  b.textContent = k.label || k.v;
  b.addEventListener('click', ()=>{
    if(k.v==='CLR'){ pin=[]; }
    else if(k.v==='DEL'){ pin.pop(); }
    else if(pin.length<5){ pin.push(k.v); }
    renderSetup();
  });
  setupKeypad.appendChild(b);
});
let pin = [];
const pindotsEl = document.getElementById('pindots');
const startTestBtn = document.getElementById('startTestBtn');
function renderSetup(){
  pindotsEl.innerHTML = '';
  for(let i=0;i<5;i++){
    const d = document.createElement('div');
    d.className = 'dot' + (i<pin.length ? ' filled':'');
    pindotsEl.appendChild(d);
  }
  startTestBtn.disabled = pin.length !== 5;
}
renderSetup();
startTestBtn.addEventListener('click', ()=>{ beginTestFlow(); });

let faceLandmarker = null, cameraLive = false, mouseMode = false, blinking = false;
const SMOOTH_ALPHA = 0.35, CURSOR_ALPHA = 0.45;
let smH = null, smV = null, smPx = null, smPy = null;

function enableMouseMode(auto){
  mouseMode = true; cameraLive = false;
  camPreview.classList.add('hidden'); gazeCursor.classList.remove('on');
  toggleModeBtn.textContent = 'Retry camera';
  setStatus(auto ? 'Camera unavailable — mouse mode' : 'Mouse mode', auto ? 'warn' : null);
}
function enableCameraMode(){
  mouseMode = false; camPreview.classList.remove('hidden');
  toggleModeBtn.textContent = 'Use mouse instead';
}
toggleModeBtn.addEventListener('click', async ()=>{ if(mouseMode){ await startCamera(); } else { enableMouseMode(false); } });

function eyeRatios(lm){
  const L = { outer:lm[33], inner:lm[133], upper:lm[159], lower:lm[145], iris:lm[468] };
  const R = { outer:lm[263], inner:lm[362], upper:lm[386], lower:lm[374], iris:lm[473] };
  const hL = (L.iris.x - Math.min(L.inner.x,L.outer.x)) / (Math.max(L.inner.x,L.outer.x)-Math.min(L.inner.x,L.outer.x) || 1);
  const hR = (R.iris.x - Math.min(R.inner.x,R.outer.x)) / (Math.max(R.inner.x,R.outer.x)-Math.min(R.inner.x,R.outer.x) || 1);
  const vL = (L.iris.y - L.upper.y) / ((L.lower.y - L.upper.y) || 1);
  const vR = (R.iris.y - R.upper.y) / ((R.lower.y - R.upper.y) || 1);
  return { h:(hL+hR)/2, v:(vL+vR)/2 };
}

function solve3x3(M,b){
  const A=M.map(r=>r.slice()), y=b.slice();
  for(let c=0;c<3;c++){
    let piv=c; for(let r=c+1;r<3;r++){ if(Math.abs(A[r][c])>Math.abs(A[piv][c])) piv=r; }
    if(piv!==c){ [A[c],A[piv]]=[A[piv],A[c]]; [y[c],y[piv]]=[y[piv],y[c]]; }
    const d=A[c][c]||1e-9;
    for(let r=c+1;r<3;r++){ const f=A[r][c]/d; for(let cc=c;cc<3;cc++) A[r][cc]-=f*A[c][cc]; y[r]-=f*y[c]; }
  }
  const x=[0,0,0];
  for(let r=2;r>=0;r--){ let s=y[r]; for(let c=r+1;c<3;c++) s-=A[r][c]*x[c]; x[r]=s/(A[r][r]||1e-9); }
  return x;
}
function fitAffine(samples){
  let Sh2=0,Shv=0,Sh=0,Sv2=0,Sv=0,n=samples.length,ShX=0,SvX=0,SX=0,ShY=0,SvY=0,SY=0;
  samples.forEach(s=>{ Sh2+=s.h*s.h; Shv+=s.h*s.v; Sh+=s.h; Sv2+=s.v*s.v; Sv+=s.v;
    ShX+=s.h*s.x; SvX+=s.v*s.x; SX+=s.x; ShY+=s.h*s.y; SvY+=s.v*s.y; SY+=s.y; });
  const M=[[Sh2,Shv,Sh],[Shv,Sv2,Sv],[Sh,Sv,n]];
  const [ax,bx,cx]=solve3x3(M,[ShX,SvX,SX]);
  const [ay,by,cy]=solve3x3(M,[ShY,SvY,SY]);
  return { ax,bx,cx, ay,by,cy };
}
let calModel = null;
function applyCalibration(h,v){
  if(!calModel){
    return { x: window.innerWidth/2 + (h-0.5)*window.innerWidth*2.4,
             y: window.innerHeight/2 + (v-0.5)*window.innerHeight*2.8 };
  }
  const {ax,bx,cx,ay,by,cy} = calModel;
  return { x: ax*h+bx*v+cx, y: ay*h+by*v+cy };
}

let lastVideoTime = -1;
function detectLoop(){
  if(!cameraLive) return;
  requestAnimationFrame(detectLoop);
  if(video.currentTime === lastVideoTime) return;
  lastVideoTime = video.currentTime;
  const result = faceLandmarker.detectForVideo(video, performance.now());
  if(!result.faceLandmarks || result.faceLandmarks.length===0){ gazeCursor.classList.remove('on'); return; }
  const lm = result.faceLandmarks[0];
  const { h, v } = eyeRatios(lm);
  smH = (smH===null)? h : smH + SMOOTH_ALPHA*(h-smH);
  smV = (smV===null)? v : smV + SMOOTH_ALPHA*(v-smV);
  const mapped = applyCalibration(smH, smV);
  smPx = (smPx===null)? mapped.x : smPx + CURSOR_ALPHA*(mapped.x-smPx);
  smPy = (smPy===null)? mapped.y : smPy + CURSOR_ALPHA*(mapped.y-smPy);
  updateCursor(smPx, smPy);

  if(phase==='test'){ testTick(smPx, smPy); }

  if(result.faceBlendshapes && result.faceBlendshapes.length){
    const cats = result.faceBlendshapes[0].categories;
    const l = cats.find(c=>c.categoryName==='eyeBlinkLeft')?.score ?? 0;
    const r = cats.find(c=>c.categoryName==='eyeBlinkRight')?.score ?? 0;
    const avg = (l+r)/2;
    if(!blinking && avg>0.5){ blinking = true; onBlink(); }
    else if(blinking && avg<0.22){ blinking = false; }
  }
}

async function startCamera(){
  setStatus('Requesting camera…', 'warn');
  try{
    const stream = await navigator.mediaDevices.getUserMedia({ video:{ width:480, height:360, facingMode:{ideal:'user'} }, audio:false });
    video.srcObject = stream; await video.play();
    if(!faceLandmarker){
      setStatus('Loading face model…', 'warn');
      const withTimeout = (p, ms, label) => Promise.race([
        p, new Promise((_,rej)=>setTimeout(()=>rej(new Error(label+' timed out')), ms))
      ]);
      const { FaceLandmarker, FilesetResolver } = await withTimeout(
        import("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14"),
        15000, 'Tracking library download'
      );
      const vision = await withTimeout(
        FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"),
        15000, 'WASM runtime download'
      );
      faceLandmarker = await withTimeout(
        FaceLandmarker.createFromOptions(vision, {
          baseOptions:{ modelAssetPath:"https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task", delegate:"GPU" },
          outputFaceBlendshapes:true, runningMode:"VIDEO", numFaces:1
        }),
        20000, 'Face model download'
      );
    }
    cameraLive = true; enableCameraMode();
    setStatus('Camera ready', 'live');
    detectLoop();
  } catch(err){
    console.warn('Camera/gaze init failed:', err);
    enableMouseMode(true);
    setStatus(`Camera failed: ${err && err.message ? err.message : err}`, 'warn');
  }
}
startCamera();

document.addEventListener('mousemove', (e)=>{
  if(!mouseMode) return;
  smPx = e.clientX; smPy = e.clientY;
  updateCursor(smPx, smPy);
  if(phase==='test') testTick(smPx, smPy);
});
document.addEventListener('click', ()=>{ if(mouseMode) onBlink(); });
document.addEventListener('keydown', (e)=>{ if(mouseMode && e.code==='Space'){ e.preventDefault(); onBlink(); } });

function updateCursor(x,y){
  gazeCursor.style.left = x+'px'; gazeCursor.style.top = y+'px';
  gazeCursor.classList.add('on');
}

const calScreen = document.getElementById('calScreen');
const calText = document.getElementById('calText');
const CAL_POINTS = [
  {pos:'top', xPct:50, yPct:15}, {pos:'right', xPct:85, yPct:50},
  {pos:'bottom', xPct:50, yPct:85}, {pos:'left', xPct:15, yPct:50},
  {pos:'center', xPct:50, yPct:50},
];
let calIndex = 0, calSamples = [], calDotEl = null;

function beginTestFlow(){
  if(mouseMode){ startTestSequence(); return; }
  showScreen('cal');
  calIndex = 0; calSamples = [];
  showCalDot();
}
function showCalDot(){
  if(calDotEl) calDotEl.remove();
  const p = CAL_POINTS[calIndex];
  calDotEl = document.createElement('div');
  calDotEl.className = 'calDot';
  calDotEl.style.left = (window.innerWidth*p.xPct/100)+'px';
  calDotEl.style.top = (window.innerHeight*p.yPct/100)+'px';
  calDotEl.addEventListener('click', onCalTap);
  calScreen.appendChild(calDotEl);
  calText.innerHTML = `<b>Calibrating (${calIndex+1} / ${CAL_POINTS.length})</b><br>Look at the glowing dot, then tap it.`;
}
function onCalTap(){
  if(smH===null || smV===null) return;
  const p = CAL_POINTS[calIndex];
  calSamples.push({ h:smH, v:smV, x: window.innerWidth*p.xPct/100, y: window.innerHeight*p.yPct/100 });
  calIndex++;
  if(calIndex < CAL_POINTS.length){ showCalDot(); }
  else{
    calModel = fitAffine(calSamples);
    if(calDotEl) calDotEl.remove();
    setStatus('Calibrated — tracking live', 'live');
    startTestSequence();
  }
}

const testTopInfo = document.getElementById('testTopInfo');
const quadrantPanel = document.getElementById('quadrantPanel');
const triEls = { top:quadrantPanel.querySelector('[data-pos="top"]'), right:quadrantPanel.querySelector('[data-pos="right"]'),
                 bottom:quadrantPanel.querySelector('[data-pos="bottom"]'), left:quadrantPanel.querySelector('[data-pos="left"]') };
const CIRC = 2*Math.PI*69;
Object.values(triEls).forEach(el=>{ el.querySelector('.progress').style.strokeDasharray = CIRC.toFixed(3); el.querySelector('.progress').style.strokeDashoffset = CIRC.toFixed(3); });

let testIndex = 0, entered = [];
let currentQuadrant = null, dwellStart = 0, readyQuadrant = null, cooldownUntil = 0;
const DWELL_MS = 1000, COOLDOWN_MS = 550;

function startTestSequence(){
  testIndex = 0; entered = [];
  showScreen('test');
  buildPanel();
}

function buildPanel(){
  const expected = pin[testIndex];
  const others = new Set([expected]);
  while(others.size < 4){ others.add(String(Math.floor(Math.random()*10))); }
  const nums = shuffle([...others]);
  const positions = shuffle(['top','right','bottom','left']);
  positions.forEach((pos,i)=>{
    const el = triEls[pos];
    el.dataset.value = nums[i];
    el.querySelector('.triNum').textContent = nums[i];
    el.classList.remove('gazed','ready','correct','wrong');
    el.querySelector('.progress').style.strokeDashoffset = CIRC.toFixed(3);
  });
  currentQuadrant = null; readyQuadrant = null; dwellStart = performance.now();
  cooldownUntil = performance.now() + 250;
  testTopInfo.innerHTML = `Digit <b>${testIndex+1}</b> of 5 — look at your next PIN digit, blink to confirm`;
}

function pointToQuadrant(px, py){
  const rect = quadrantPanel.getBoundingClientRect();
  let x = Math.min(Math.max(px, rect.left), rect.right) - rect.left;
  let y = Math.min(Math.max(py, rect.top), rect.bottom) - rect.top;
  const W = rect.width, H = rect.height;
  const lineA = (H/W)*x;
  const lineB = H - (H/W)*x;
  if(y < lineA && y < lineB) return 'top';
  if(y > lineA && y > lineB) return 'bottom';
  if(y > lineA && y < lineB) return 'left';
  return 'right';
}

function setQuadrant(q){
  if(q !== currentQuadrant){
    currentQuadrant = q;
    dwellStart = performance.now();
    Object.values(triEls).forEach(el=>{ el.classList.remove('gazed','ready'); el.querySelector('.progress').style.strokeDashoffset = CIRC.toFixed(3); });
    if(q) triEls[q].classList.add('gazed');
  }
}

function testTick(px, py){
  if(!pin.length) return;
  const q = pointToQuadrant(px, py);
  setQuadrant(q);
  const now = performance.now();
  if(now < cooldownUntil || !currentQuadrant) return;
  const progress = Math.min((now - dwellStart)/DWELL_MS, 1);
  const el = triEls[currentQuadrant];
  el.querySelector('.progress').style.strokeDashoffset = (CIRC*(1-progress)).toFixed(3);
  if(progress >= 1){ el.classList.add('ready'); readyQuadrant = currentQuadrant; }
}

function onBlink(){
  if(phase !== 'test') return;
  const now = performance.now();
  if(!readyQuadrant || now < cooldownUntil) return;
  const el = triEls[readyQuadrant];
  const chosen = el.dataset.value;
  const expected = pin[testIndex];
  entered.push(chosen);
  el.classList.add(chosen === expected ? 'correct' : 'wrong');
  readyQuadrant = null;
  cooldownUntil = now + COOLDOWN_MS;
  setTimeout(()=>{
    testIndex++;
    if(testIndex < 5){ buildPanel(); } else { showResult(); }
  }, 650);
}

const resultBadge = document.getElementById('resultBadge');
const rowPin = document.getElementById('rowPin');
const rowEntered = document.getElementById('rowEntered');
document.getElementById('retryTestBtn').addEventListener('click', startTestSequence);
document.getElementById('newPinBtn').addEventListener('click', ()=>{ pin=[]; renderSetup(); showScreen('setup'); });

function showResult(){
  showScreen('result');
  const allCorrect = pin.every((d,i)=> d === entered[i]);
  resultBadge.textContent = allCorrect ? 'PASS — PIN matched' : 'MISMATCH';
  resultBadge.className = 'resultBadge ' + (allCorrect ? 'pass':'fail');
  rowPin.innerHTML = ''; rowEntered.innerHTML = '';
  pin.forEach((d,i)=>{
    const okA = document.createElement('div'); okA.className='rdigit ok'; okA.textContent=d; rowPin.appendChild(okA);
    const match = entered[i] === d;
    const b = document.createElement('div'); b.className='rdigit '+(match?'ok':'bad'); b.textContent = entered[i]; rowEntered.appendChild(b);
  });
}
}catch(fatalErr){
  console.error('Fatal init error:', fatalErr);
  const el = document.getElementById('statusText');
  if(el) el.textContent = 'Init failed: ' + (fatalErr && fatalErr.message ? fatalErr.message : fatalErr);
  const dot = document.getElementById('statusDot');
  if(dot) dot.className = 'dotstate warn';
}
</script>
</body>
</html>
